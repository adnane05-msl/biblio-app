# ======== PostgreSQL ========
spring.datasource.url=jdbc:postgresql://localhost:5432/bibliodb
spring.datasource.username=biblio_user
spring.datasource.password=biblio1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ======== JPA / Hibernate ========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======== Serveur ========
server.port=9090
spring.application.name=biblio-app

# ======== JWT ========
jwt.secret=biblio_app_secret_key_2024_very_long_secure_key_minimum_32_chars
jwt.expiration=86400000